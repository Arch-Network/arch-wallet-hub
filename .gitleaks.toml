# Gitleaks config — supplements the built-in default rules with
# project-specific patterns. Build/CI uses `gitleaks-action`; this
# file is also picked up by a local `gitleaks detect`.

title = "arch-wallet-hub gitleaks config"

[extend]
# Inherit gitleaks' built-in rules (AWS keys, GitHub tokens, etc).
useDefault = true

[[rules]]
id = "arch-indexer-api-key"
description = "Arch Explorer indexer API key (arch_live_... or arch_test_...)"
regex = '''arch_(live|test)_[A-Za-z0-9]{32,}'''
tags = ["api-key", "arch"]

[[rules]]
id = "wallet-hub-platform-api-key"
description = "Wallet Hub platform API key (base64url, 43 chars after prefix marker)"
regex = '''(?i)(hub_api_key|hub_apikey|platform_api_key)['"\s:=]{1,5}['"]?[A-Za-z0-9_-]{40,}'''
tags = ["api-key", "wallet-hub"]

[[rules]]
id = "turnkey-private-key"
description = "Turnkey API private key (32-byte hex)"
regex = '''(?i)(turnkey[_-]?api[_-]?private[_-]?key)['"\s:=]{1,5}['"]?[a-f0-9]{64}'''
tags = ["api-key", "turnkey"]

[allowlist]
# Do not flag known-rotated keys that we deliberately keep around in
# wallet-store migrations and SECURITY.md to recognise stale state on
# upgrade. Also allowlist UPPER_SNAKE_CASE placeholders used in docs
# to demonstrate request shapes, and on-chain public keys (program /
# config / quote-signer pubkeys, vault addresses) that live in the
# swap-engine network config and are by definition public.
description = "Rotated keys, on-chain pubkeys, and docs placeholders"
regexes = [
  '''D3DqTHT1JgTAzyYWiZmZ0KWjKJ-f_Tiilw_VtrW9Wog''',
  '''OZfoD0ZJh6kQpd3Lr4TvLbnocS2g_eooZlQ7VEfbE4M''',
  '''x7NaU5AHiZ0UZxGLTm2WMqWsZkWB3B2cvnwL9RUDDLw''',
  '''arch_live_lALRxJatV7EdPcYYWpW062daTnaeJGFPgSTRcL1Y6dXpZnFq''',
  # Doc placeholders that look like keys but aren't.
  '''YOUR_API_KEY''',
  '''<YOUR_API_KEY>''',
  '''REPLACE_ME''',
  '''CHANGEME''',
]
paths = [
  '''SECURITY\.md''',
  '''docs/security/.*''',
  '''.gitleaks\.toml''',
  '''apps/chrome-wallet/src/state/wallet-store\.ts''',
  # Migration test asserts the verbatim rotated LEAKED_INDEXER_API_KEY
  # constant defined in wallet-store.ts (allowlisted above) so a future
  # edit to the constant shows up as a test diff.
  '''apps/chrome-wallet/src/state/__tests__/indexer-key-migration\.test\.ts''',
  # Swap-engine network configs hold only public on-chain identifiers
  # (program IDs, vault pubkeys, quote-signer pubkeys). Anything
  # actually secret in this package would be loaded from env.
  '''packages/arch-swap-engine/src/lib/network/.*\.ts''',
  # deploy/README.md uses placeholder curl examples. The actual key
  # comes from Secrets Manager at deploy time.
  '''deploy/README\.md''',
]
