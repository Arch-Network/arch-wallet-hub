name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default deny; each job requests what it needs.
permissions: {}

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      # Install gitleaks directly rather than via gitleaks/gitleaks-action
      # because the latter requires a paid license key for org-owned
      # repositories. The OSS binary is MIT-licensed and identical in
      # behaviour for our use.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (working tree)
        # Scan the current working tree only (`--no-git`). Historical
        # commits contained keys that we have since rotated; rescanning
        # them on every push just re-flags the audit findings we
        # already remediated. To audit history, run
        # `gitleaks detect --source . --config .gitleaks.toml` locally.
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --verbose

  lockfile-lint:
    name: Lockfile integrity (lockfile-lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Only list workspaces that commit a package-lock.json. Library
        # packages (wallet-hub-sdk, wallet-hub-ui, arch-swap-engine)
        # deliberately do not commit lockfiles because they ship to
        # consumers who resolve transitive deps themselves.
        workspace:
          - apps/chrome-wallet
          - apps/demo-dapp
          - services/wallet-hub-api
          - infra/cdk
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: Install lockfile-lint
        run: npm install -g lockfile-lint@4.13.2
      - name: Lint lockfile
        working-directory: ${{ matrix.workspace }}
        # `string-width-cjs`, `strip-ansi-cjs`, `wrap-ansi-cjs` are
        # documented yargs/inquirer aliases for the CJS builds of the
        # underlying packages (they resolve via `npm:string-width@^4`,
        # etc.). They are not typosquats. Allowlist them rather than
        # turning off --validate-package-names, which still protects
        # against the actual typosquat class.
        run: |
          lockfile-lint \
            --path package-lock.json \
            --type npm \
            --validate-https \
            --allowed-hosts npm \
            --validate-package-names \
            --allowed-package-name-aliases string-width-cjs:string-width \
            --allowed-package-name-aliases strip-ansi-cjs:strip-ansi \
            --allowed-package-name-aliases wrap-ansi-cjs:wrap-ansi \
            --validate-integrity \
            --empty-hostname false

  npm-audit:
    name: npm audit (per workspace)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - apps/chrome-wallet
          - apps/demo-dapp
          - services/wallet-hub-api
          - infra/cdk
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: Install audit-ci
        run: npm install -g audit-ci@7.1.0
      - name: audit-ci (high+; per-workspace allowlist)
        working-directory: ${{ matrix.workspace }}
        # Fails the job on any high/critical advisory not listed in
        # the workspace's audit-ci.jsonc allowlist. Every allowlist
        # entry must carry a justification + tracking issue. When no
        # config file is present audit-ci falls back to defaults
        # (high+, devDependencies skipped — same posture as the
        # previous `npm audit --omit=dev --audit-level=high`).
        run: |
          if [ -f audit-ci.jsonc ]; then
            audit-ci --config audit-ci.jsonc
          else
            audit-ci --high --skip-dev --report-type important
          fi

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -version
      # We disable shellcheck integration (`-shellcheck=`) for now —
      # the audit cluster surfaced ~50 SC2086 "double-quote to prevent
      # globbing" notes in deploy.yml that are real but not security
      # issues. Tracked separately under the audit backlog as an Infra
      # cleanup. Re-enable once that PR lands.
      - name: Run actionlint
        run: ./actionlint -color -shellcheck=
