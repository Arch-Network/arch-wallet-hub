name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default deny; each job requests what it needs.
permissions: {}

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lockfile-lint:
    name: Lockfile integrity (lockfile-lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - apps/chrome-wallet
          - apps/demo-dapp
          - apps/mobile-wallet
          - services/wallet-hub-api
          - packages/wallet-hub-sdk
          - packages/wallet-hub-ui
          - packages/arch-swap-engine
          - infra/cdk
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: Install lockfile-lint
        run: npm install -g lockfile-lint@4.13.2
      - name: Lint lockfile
        working-directory: ${{ matrix.workspace }}
        if: hashFiles(format('{0}/package-lock.json', matrix.workspace)) != ''
        run: |
          lockfile-lint \
            --path package-lock.json \
            --type npm \
            --validate-https \
            --allowed-hosts npm \
            --validate-package-names \
            --validate-checksum \
            --validate-integrity \
            --empty-hostname false

  npm-audit:
    name: npm audit (per workspace)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - apps/chrome-wallet
          - apps/demo-dapp
          - apps/mobile-wallet
          - services/wallet-hub-api
          - packages/wallet-hub-sdk
          - packages/wallet-hub-ui
          - packages/arch-swap-engine
          - infra/cdk
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: npm audit (high+)
        working-directory: ${{ matrix.workspace }}
        # Fails the job on any high/critical advisory. Moderate noise
        # is suppressed for now; flip to `--audit-level=moderate` once
        # the backlog is clear.
        run: npm audit --audit-level=high --omit=dev

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -version
      - name: Run actionlint
        run: ./actionlint -color
