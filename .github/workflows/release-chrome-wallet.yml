name: Release Chrome Wallet

on:
  push:
    tags:
      - "wallet-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      skip_cws:
        description: "Skip Chrome Web Store upload"
        required: false
        type: boolean
        default: false

# Default deny; each job opts into only what it needs.
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Job-level env so EVERY build invocation (incl. the rebuild that
    # `wxt zip` triggers internally during the zip step) sees the keys.
    # Previously these were only on the "Build extension" step, so
    # `wxt zip` rebuilt from scratch with empty env and shipped a zip
    # that lacked the API keys.
    env:
      WXT_HUB_API_KEY: ${{ secrets.WXT_HUB_API_KEY }}
      WXT_INDEXER_API_KEY: ${{ secrets.WXT_INDEXER_API_KEY }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      zip-path: ${{ steps.zip.outputs.path }}
      zip-name: ${{ steps.zip.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/chrome-wallet/package-lock.json

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#wallet-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=wallet-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build wallet-hub-sdk
        working-directory: packages/wallet-hub-sdk
        run: |
          npm ci || npm install
          npm run build

      - name: Build arch-swap-engine
        working-directory: packages/arch-swap-engine
        run: |
          npm ci || npm install
          npm run build

      - name: Install chrome-wallet dependencies
        working-directory: apps/chrome-wallet
        run: npm ci

      - name: Stamp version into manifest
        working-directory: apps/chrome-wallet
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm pkg set version="$VERSION"

      - name: Verify build-time secrets are populated
        # Fail fast if WXT_HUB_API_KEY is missing; otherwise end users hit
        # "Missing Wallet Hub API key" at onboarding (the popup throws and
        # the wallet is unusable).
        run: |
          if [ -z "$WXT_HUB_API_KEY" ]; then
            echo "::error::WXT_HUB_API_KEY secret is empty"
            exit 1
          fi

      - name: Build extension
        working-directory: apps/chrome-wallet
        run: npm run build

      - name: Create zip archive
        working-directory: apps/chrome-wallet
        run: npm run zip

      - name: Locate zip file
        id: zip
        working-directory: apps/chrome-wallet
        run: |
          ZIP_PATH=$(find .output -name '*.zip' | head -n 1)
          echo "path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "name=arch-wallet-${{ steps.version.outputs.version }}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload zip artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: extension-zip
          path: apps/chrome-wallet/${{ steps.zip.outputs.path }}

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: extension-zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: "Arch Wallet v${{ needs.build.outputs.version }}"
          body: |
            ## Arch Wallet v${{ needs.build.outputs.version }}

            ### Install from Chrome Web Store
            If published: install directly from the [Chrome Web Store listing](https://chrome.google.com/webstore/detail/${{ secrets.CWS_EXTENSION_ID }}).

            ### Manual Installation
            1. Download **arch-wallet-${{ needs.build.outputs.version }}.zip** below
            2. Unzip the file
            3. Open Chrome and navigate to `chrome://extensions`
            4. Enable **Developer mode** (toggle in top-right corner)
            5. Click **Load unpacked**
            6. Select the unzipped folder
            7. The Arch Wallet icon will appear in your extensions toolbar
          draft: false
          prerelease: false
          files: "*.zip"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  chrome-web-store:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_cws }}
    # Minimal scope: this job only needs to download the artifact and
    # publish to the Chrome Web Store. No repo write needed.
    permissions:
      contents: read
    steps:
      - name: Check CWS secrets are configured
        run: |
          missing=""
          [ -z "$CWS_EXTENSION_ID" ] && missing="$missing CWS_EXTENSION_ID"
          [ -z "$CWS_PUBLISHER_ID" ] && missing="$missing CWS_PUBLISHER_ID"
          [ -z "$CWS_CLIENT_ID" ] && missing="$missing CWS_CLIENT_ID"
          [ -z "$CWS_CLIENT_SECRET" ] && missing="$missing CWS_CLIENT_SECRET"
          [ -z "$CWS_REFRESH_TOKEN" ] && missing="$missing CWS_REFRESH_TOKEN"
          if [ -n "$missing" ]; then
            echo "::warning::Missing Chrome Web Store secret(s):$missing — skipping Chrome Web Store upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        id: check
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}

      - name: Download zip artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: extension-zip

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      - name: Install chrome-webstore-upload-cli (pinned)
        if: steps.check.outputs.skip != 'true'
        # Pinned to a specific version so an unattended global `npm
        # install` does not pull a future compromised release on top of
        # CWS refresh-token-bearing job context.
        run: npm install -g chrome-webstore-upload-cli@3.3.2

      - name: Upload to Chrome Web Store
        if: steps.check.outputs.skip != 'true'
        run: |
          ZIP_FILE=$(find . -name '*.zip' | head -n 1)
          echo "Uploading $ZIP_FILE to Chrome Web Store..."
          chrome-webstore-upload upload \
            --source "$ZIP_FILE" \
            --extension-id "$CWS_EXTENSION_ID" \
            --publisher-id "$CWS_PUBLISHER_ID" \
            --auto-publish
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
