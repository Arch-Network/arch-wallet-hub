name: Deploy to ECS Fargate

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 590184001652.dkr.ecr.us-east-1.amazonaws.com
  API_REPO: wallet-hub-api
  FRONTEND_REPO: wallet-hub-frontend
  ECS_CLUSTER: wallet-hub
  API_SERVICE: wallet-hub-api
  FRONTEND_SERVICE: wallet-hub-frontend

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Build and push API image
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$API_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$API_REPO:latest \
            -f deploy/Dockerfile.api .
          docker push $ECR_REGISTRY/$API_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$API_REPO:latest

      # Frontend (apps/demo-dapp) is currently broken: it calls 13
      # SDK methods and references 3 types that no longer exist on
      # `@arch-network/wallet-hub-sdk` after a refactor weeks ago.
      # Auto-deploy has been failing on this for 50+ runs; surfaced
      # cleanly once the OIDC auth gate was fixed (2026-05-28).
      #
      # The chrome wallet is the product; demo-dapp is reference code.
      # Disabling these four steps keeps the API auto-deploy unblocked
      # without touching demo-dapp source. The existing
      # wallet-hub-frontend ECS service keeps serving its current
      # image (already stale from before this conversation).
      #
      # To re-enable: rewrite demo-dapp against the current SDK
      # surface (or rip it out of the repo) and flip these guards
      # back to a passing condition.
      - name: Build and push Frontend image
        if: false
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg VITE_WALLET_HUB_BASE_URL=/v1 \
            --build-arg NGINX_CONF=deploy/nginx-fargate.conf.template \
            -t $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$FRONTEND_REPO:latest \
            -f deploy/Dockerfile.frontend .
          docker push $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$FRONTEND_REPO:latest

      # NOTE: This job ONLY rolls the running tasks onto the newest image
      # (`update-service --force-new-deployment`). It does NOT register a
      # new task definition. Any change to the task def, environment
      # variables, or secrets (e.g. DB_*, AUDIT_HMAC_SECRET, CORS) MUST go
      # through the CDK stack (infra/cdk) and `cdk deploy` — editing them
      # here or by hand in the console causes the live task to drift from
      # the source of truth (which is exactly what happened before the
      # chore/wallet-hub-cdk-reconcile reconciliation). Keep task-def
      # config in CDK only.
      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $API_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy Frontend service
        if: false
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for API service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $API_SERVICE \
            --region $AWS_REGION
        timeout-minutes: 10

      - name: Wait for Frontend service stability
        if: false
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $FRONTEND_SERVICE \
            --region $AWS_REGION
        timeout-minutes: 10
