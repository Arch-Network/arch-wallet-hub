<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arch Wallet</title>
    <!--
      Node-globals shim. Loaded as a parser-blocking external script
      (no defer/async/type=module) so it runs synchronously during
      HTML parsing, before any module script (which are deferred by
      default) and before any chunk the bundler hoists from
      `main.tsx`'s imports. Must shim `global` + `process` here
      because the swap engine's transitive BTC deps reference them at
      module init, which otherwise outruns the ES-module polyfill in
      the bundle graph.

      Why external (not inline): the MV3 extension CSP is
      `script-src 'self' 'wasm-unsafe-eval'` -- no `unsafe-inline`,
      no nonce, no hash. An inline `<script>` would be silently
      blocked, leaving `process` undefined and crashing
      `buffer-polyfill.ts` (and therefore the whole popup).

      Buffer is still shimmed from `buffer-polyfill.ts` because the
      `buffer` package needs ESM resolution and only `main.tsx`'s
      graph can provide it.
    -->
    <script src="/node-globals-shim.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/reflect-metadata.js"></script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
